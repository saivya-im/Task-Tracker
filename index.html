<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ScrumBoard — Daily Standup Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#2563eb;--purple:#7c3aed;--teal:#0d9488;
  --bg:#f1f5f9;--sidebar:#1e293b;--card:#fff;
  --border:#e2e8f0;--text:#0f172a;--text2:#64748b;
  --done:#22c55e;--blocked:#ef4444;--inprog:#3b82f6;--todo:#94a3b8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* LOGIN */
#login-page{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1e293b,#334155);}
.login-card{background:#fff;border-radius:16px;padding:40px;width:390px;box-shadow:0 24px 64px rgba(0,0,0,.3);}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.login-logo-icon{width:44px;height:44px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.login-logo h1{font-size:20px;font-weight:800;color:var(--text);}
.login-logo p{font-size:11px;color:var(--text2);margin-top:1px;}
.demo-hint{margin-top:18px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);}
.demo-hint strong{display:block;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}

/* FORM */
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;background:#fff;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);}
.fg textarea{resize:vertical;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.err{color:var(--blocked);font-size:12px;margin-top:6px;display:none;}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:#1d4ed8;}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-sm{padding:5px 11px;font-size:11px;}
.btn-full{width:100%;justify-content:center;}

/* LOADING */
#loading{display:none;position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:9000;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#fff;font-size:14px;font-weight:600;}

/* SETUP SCREEN */
#setup-page{display:none;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1e293b,#334155);}
.setup-card{background:#fff;border-radius:16px;padding:36px;width:500px;box-shadow:0 24px 64px rgba(0,0,0,.3);}
.setup-card h2{font-size:18px;font-weight:800;margin-bottom:6px;}
.setup-card p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.setup-step{background:#f8fafc;border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1px solid var(--border);}
.setup-step .sn{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0;}
.setup-step-title{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;}
.setup-step p{font-size:12px;color:var(--text2);margin:0;}
.setup-step code{background:#e2e8f0;padding:1px 5px;border-radius:4px;font-size:11px;}
.sql-box{background:#1e293b;color:#e2e8f0;border-radius:8px;padding:12px;font-size:11px;font-family:monospace;line-height:1.6;margin-top:8px;overflow-x:auto;}

/* APP */
#app{display:none;height:100vh;flex-direction:row;}
.sidebar{width:220px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-logo h2{color:#fff;font-size:15px;font-weight:800;}
.sidebar-logo p{color:rgba(255,255,255,.35);font-size:11px;margin-top:2px;}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;margin-bottom:2px;transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:var(--blue);color:#fff;}
.nav-icon{font-size:15px;width:20px;text-align:center;}
.sidebar-user{padding:14px;border-top:1px solid rgba(255,255,255,.08);}
.user-info{display:flex;align-items:center;gap:9px;}
.uav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.user-details p{font-size:13px;font-weight:700;color:#fff;}
.user-details span{font-size:10px;color:rgba(255,255,255,.4);text-transform:capitalize;}
.logout-btn{margin-top:10px;width:100%;padding:7px;background:rgba(255,255,255,.07);border:none;border-radius:6px;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;}
.logout-btn:hover{background:rgba(255,255,255,.14);color:#fff;}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.top-bar h2{font-size:17px;font-weight:800;}
.top-bar-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.top-bar-actions{display:flex;gap:7px;align-items:center;}
.content{flex:1;overflow-y:auto;padding:22px 24px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;}
.sync-dot.syncing{background:#f59e0b;animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* CHIPS */
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.ch-todo{background:#fef9c3;color:#854d0e;}
.ch-in_progress{background:#dbeafe;color:#2563eb;}
.ch-blocked{background:#fee2e2;color:#ef4444;}
.ch-done{background:#dcfce7;color:#16a34a;}.ch-review{background:#f0fdf4;color:#0d9488;}
.ch-discussion{background:#ccfbf1;color:#0f766e;}
.ch-dependant{background:#ede9fe;color:#7c3aed;}
.ch-dropped{background:#ffedd5;color:#c2410c;}
.ch-on_leave{background:#fee2e2;color:#ef4444;}
.ch-P1{background:#fee2e2;color:#dc2626;}
.ch-P2{background:#fef3c7;color:#d97706;}
.ch-P3{background:#f1f5f9;color:#64748b;}
.smry-chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:#e2e8f0;color:#64748b;border:2px solid transparent;transition:all .15s;user-select:none;}
.smry-chip.active{border-color:currentColor;opacity:1;}
.smry-chip:not(.active){opacity:.35;border-color:transparent;}
.ch-carried{background:#fdf4ff;color:#9333ea;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:800;}
.bg-grey{background:#e2e8f0;color:#64748b;}
.bg-yellow{background:#fef3c7;color:#d97706;}
.bg-red{background:#fee2e2;color:#dc2626;}
.bg-orange{background:#fff7ed;color:#ea580c;}
.bg-green{background:#dcfce7;color:#16a34a;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.stat-card{background:#fff;border-radius:10px;padding:16px;border:1.5px solid var(--border);}
.stat-card h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:6px;}
.stat-num{font-size:28px;font-weight:800;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.filter-bar select,.filter-bar input[type=text]{border:1.5px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12px;color:var(--text);background:#fff;outline:none;}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--blue);}

/* BOARD */
.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;}
.board-col{flex-shrink:0;width:235px;}.board-col.drag-over{background:rgba(59,130,246,.06);border-radius:10px;outline:2px dashed #3b82f6;}
.sp-board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:4px 0;height:calc(100vh - 160px);}
.sp-col{background:#f8fafc;border-radius:12px;border:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sp-col-hdr{padding:12px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#fff;display:flex;align-items:center;justify-content:space-between;}
.sp-col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.sp-card{background:#fff;border-radius:10px;border:1.5px solid var(--border);padding:12px;cursor:grab;transition:box-shadow .15s;}
.sp-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);}
.sp-card.dragging{opacity:.4;}
.sp-col.sp-drag-over{outline:2px dashed #3b82f6;background:rgba(59,130,246,.04);}.tcard.dragging{opacity:.4;}
.board-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.bcol-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.bcol-count{background:var(--border);color:var(--text2);font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;}

/* TASK CARD */
.tcard{background:#fff;border-radius:10px;padding:11px 12px;border:1.5px solid var(--border);border-left:4px solid var(--border);margin-bottom:7px;cursor:pointer;transition:box-shadow .15s;position:relative;}
.tcard:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);}
.tcard.type-bug{border-left:4px solid #ef4444;background:#fffbfb;}
.tcard.type-feature{border-left:4px solid #3b82f6;background:#fafcff;}
.tcard.type-optimisation,.tcard.type-chore{border-left:4px solid #f59e0b;background:#fffdf5;}
.tcard.type-ad-hoc{border-left:4px solid #8b5cf6;background:#fdf8ff;}
.tcard.breached{border-left:4px solid var(--blocked)!important;outline:1.5px solid #fecaca;}
.tcard.aging{outline:1.5px solid #fde68a;}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.tc-title{font-size:12px;font-weight:700;line-height:1.35;flex:1;padding-right:6px;color:var(--text);}
.info-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:1px 3px;border-radius:4px;flex-shrink:0;}
.info-btn:hover{color:var(--blue);background:#f1f5f9;}
.tc-module{font-size:10px;color:var(--text2);margin-bottom:5px;}
.tc-module b{color:var(--blue);}
.tc-chips{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px;}
.tc-footer{display:flex;align-items:center;justify-content:space-between;}
.tc-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0;}
.tc-name{font-size:10px;color:var(--text2);margin-left:4px;}
.tc-edd{font-size:10px;color:var(--text2);}
.tc-edd.red{color:var(--blocked);font-weight:700;}
.tc-prog{margin-top:7px;}
.pbar{height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;transition:width .3s;}
.ptext{font-size:9px;color:var(--text2);margin-top:2px;}
.aging-flag{font-size:9px;color:#f59e0b;font-weight:700;margin-top:3px;}

/* WORKLOAD */
.wl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.wl-card{background:#fff;border-radius:10px;padding:14px;border:1.5px solid var(--border);}
.wl-card.blocked-card{border-color:var(--blocked);}
.wl-card.bugs-card{border-color:#f59e0b;}
.wl-card.empty-card{border-style:dashed;border-color:#94a3b8;}
.wl-name{font-size:13px;font-weight:700;margin-bottom:6px;}
.wl-stats{font-size:11px;color:var(--text2);margin-bottom:7px;}
.wl-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.wl-task-preview{font-size:10px;color:var(--text2);padding:3px 6px;background:#f8fafc;border-radius:4px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* DEV VIEW */
.dev-row{background:#fff;border-radius:10px;padding:13px 16px;border:1.5px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.dev-row.breached{border-left:4px solid var(--blocked);}
.dr-info{flex:1;}
.dr-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.dr-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--text2);}
.dr-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.status-sel{border:1.5px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;outline:none;background:#fff;}
.blocker-btn{padding:5px 10px;background:#fee2e2;color:#ef4444;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;}
.blocker-btn:hover{background:var(--blocked);color:#fff;}

/* DRAWER */
#doverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;}
#drawer{position:fixed;right:-530px;top:0;bottom:0;width:510px;background:#fff;z-index:501;transition:right .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.15);}
#drawer.open{right:0;}
.dwr-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2;}
.dwr-title{font-size:15px;font-weight:800;flex:1;padding-right:12px;line-height:1.3;}
.dwr-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);}
.dwr-body{padding:18px 22px;}
.dsec{margin-bottom:22px;}
.dsec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:10px;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.meta-item label{font-size:10px;font-weight:700;color:var(--text2);}
.meta-item p{font-size:13px;font-weight:700;color:var(--text);margin-top:2px;}
.edd-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sm-badge{font-size:9px;color:var(--purple);font-weight:800;background:#faf5ff;padding:2px 6px;border-radius:4px;border:1px solid #e9d5ff;}
.blocker-box{padding:10px 12px;background:#fee2e2;border-radius:8px;font-size:12px;color:#dc2626;font-weight:700;margin-top:8px;}

/* PROGRESS */
.big-pbar{height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden;margin:8px 0;}
.big-pfill{height:100%;border-radius:5px;transition:width .3s;}
.prog-manual{display:flex;align-items:center;gap:10px;margin-top:6px;}
.prog-manual input[type=range]{flex:1;accent-color:var(--blue);}
.prog-val{font-size:14px;font-weight:800;color:var(--blue);min-width:38px;}
.prog-note{font-size:10px;color:var(--text2);margin-top:4px;}

/* SUBTASKS */
.st-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:5px;}
.st-check{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;}
.st-check.done{background:var(--done);border-color:var(--done);color:#fff;}
.st-title{font-size:12px;font-weight:600;color:var(--text);}
.st-title.done{text-decoration:line-through;color:var(--text2);}
.st-meta{display:flex;gap:8px;margin-top:2px;font-size:10px;color:var(--text2);}
.st-meta b{color:var(--blue);}

/* COMMENTS */
.cmt-input-row{display:flex;gap:7px;margin-bottom:10px;}
.cmt-input-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 11px;font-size:12px;outline:none;}
.cmt-input-row input:focus{border-color:var(--blue);}
.cmt-item{display:flex;gap:8px;margin-bottom:9px;}
.cmt-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
.cmt-name{font-size:10px;color:var(--text2);margin-bottom:2px;}
.cmt-text{font-size:12px;color:var(--text);}

/* ACTIVITY */
.act-item{font-size:11px;color:var(--text2);padding:5px 0;border-bottom:1px solid #f8fafc;display:flex;justify-content:space-between;}
.act-item b{color:var(--text);}

/* MODAL */
#moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center;}
#modal{background:#fff;border-radius:14px;padding:26px;width:620px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);}#modal.fullscreen{width:100vw!important;max-width:100vw!important;height:100vh;max-height:100vh;border-radius:0;margin:0;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-hdr h3{font-size:16px;font-weight:800;}
.modal-close{background:none;border:none;font-size:21px;cursor:pointer;color:var(--text2);}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.sep{height:1px;background:var(--border);margin:16px 0;}

/* STANDUP */
#standup{display:none;position:fixed;inset:0;background:#0f172a;z-index:1000;flex-direction:column;}
.su-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 30px;border-bottom:1px solid rgba(255,255,255,.08);}
.su-hdr h2{color:#fff;font-size:18px;font-weight:800;}
.su-hdr p{color:rgba(255,255,255,.4);font-size:12px;margin-top:2px;}
.su-dots{display:flex;gap:5px;align-items:center;}
.su-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);}
.su-dot.done{background:var(--done);}
.su-dot.cur{background:var(--blue);transform:scale(1.5);}
.su-body{flex:1;display:flex;overflow:hidden;}
.su-side{width:240px;background:rgba(255,255,255,.04);padding:22px;border-right:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.su-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin-bottom:10px;}
.su-name{color:#fff;font-size:18px;font-weight:800;}
.su-role{color:rgba(255,255,255,.4);font-size:12px;}
.su-summary{margin-top:18px;}
.su-summary p{color:rgba(255,255,255,.65);font-size:12px;margin-bottom:5px;}
.su-tasks{flex:1;padding:22px;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-content:start;}
.su-sec h4{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.su-sec.y h4{color:#22c55e;}
.su-sec.t h4{color:#3b82f6;}
.su-sec.b h4{color:#ef4444;}
.su-task{background:rgba(255,255,255,.06);border-radius:8px;padding:9px 11px;margin-bottom:7px;}
.su-task p{color:rgba(255,255,255,.85);font-size:12px;font-weight:600;}
.su-task small{color:rgba(255,255,255,.35);font-size:10px;display:block;margin-top:2px;}
.su-task.bl{border-left:3px solid var(--blocked);}
.su-ftr{padding:16px 30px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;}
.su-ftr-info{color:rgba(255,255,255,.4);font-size:12px;}

/* SUMMARY */
.summ-box{background:#f8fafc;border-radius:10px;padding:14px;font-size:12px;line-height:1.75;color:var(--text);white-space:pre-wrap;font-family:monospace;max-height:420px;overflow-y:auto;border:1px solid var(--border);}

/* TOAST */

// ✏️  Fill these two values before deploying to Vercel
const SUPABASE_URL = 'https://sfhmegtbadqpdzikwndu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MLDzq-tdNxrQEpOHXMwzZQ_9h9QXz4w';

const SB={
  get url(){return SUPABASE_URL;},
  get key(){return SUPABASE_KEY;},
  get hdrs(){return{'apikey':this.key,'Authorization':'Bearer '+this.key,'Content-Type':'application/json','Prefer':'return=representation'};},
  async get(){
    const r=await fetch(this.url+'/rest/v1/tasks?select=*&order=created_at.asc',{headers:this.hdrs});
    if(!r.ok)throw new Error('Supabase fetch failed: '+r.status);
    return r.json();
  },
  async post(data){
    return fetch(this.url+'/rest/v1/tasks',{method:'POST',headers:this.hdrs,body:JSON.stringify(data)});
  },
  async patch(id,data){
    return fetch(this.url+'/rest/v1/tasks?id=eq.'+id,{method:'PATCH',headers:this.hdrs,body:JSON.stringify(data)});
  },
  async getBugCounts(){
    const r=await fetch(this.url+'/rest/v1/bug_counts?select=*',{headers:this.hdrs});
    if(!r.ok)return[];
    return r.json();
  },
  async getPwd(userId){
    try{const r=await fetch(this.url+'/rest/v1/user_passwords?user_id=eq.'+userId+'&select=password_hash',{headers:this.hdrs});
    if(!r.ok)return null;const d=await r.json();return d[0]?.password_hash||null;}catch(e){return null;}
  },
  async setPwd(userId,hash){
    return fetch(this.url+'/rest/v1/user_passwords',{method:'POST',headers:{...this.hdrs,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({user_id:userId,password_hash:hash,updated_at:new Date().toISOString()})});
  },
  async upsertBugCount(data){
    const payload=Object.fromEntries(Object.entries(data).filter(([,v])=>v!=null&&v!==undefined));
    return fetch(this.url+'/rest/v1/bug_counts',{method:'POST',headers:{...this.hdrs,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(payload)});
  },
  async getAbsent(date){
    try{const r=await fetch(this.url+'/rest/v1/daily_attendance?select=user_id&date=eq.'+date,{headers:this.hdrs});
    if(!r.ok)return[];const d=await r.json();return d.map(x=>x.user_id);}catch(e){return[];}
  },
  async setAbsent(userId,date){
    return fetch(this.url+'/rest/v1/daily_attendance',{method:'POST',headers:{...this.hdrs,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({user_id:userId,date,is_absent:true})});
  },
  async clearAbsent(userId,date){
    return fetch(this.url+'/rest/v1/daily_attendance?user_id=eq.'+userId+'&date=eq.'+date,{method:'DELETE',headers:this.hdrs});
  }
};

// ── DB (Supabase-backed, in-memory cache) ─────────────────
const db={
  tasks(){return S.tasks;},

  async init(){
    showLoading('Loading tasks…');
    try{
      const [data,counts]=await Promise.all([SB.get(),SB.getBugCounts()]);
      S.tasks=Array.isArray(data)?data:[];
      if(S.tasks.length===0){await seed();}
      if(Array.isArray(counts)){counts.forEach(c=>{S.bugCounts[c.dev_id]=c;});}
    }catch(e){
      console.error(e);
      toast('⚠️ Could not load tasks. Check Supabase config.');
      S.tasks=[];
    }
    hideLoading();
  },

  async refresh(){
    setSyncDot('syncing');
    try{
      const data=await SB.get();
      S.tasks=Array.isArray(data)?data:[];
      render();
      // Only re-render drawer if user is NOT actively typing a comment
      if(S.openTask){
        const cmtInput=document.getElementById('cmti-'+S.openTask);
        if(!cmtInput||document.activeElement!==cmtInput) openDrawer(S.openTask);
      }
    }catch(e){}
    setSyncDot('live');
  },

  createTask(t){
    t.id='t'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    t.created_at=t.updated_at=new Date().toISOString();
    t.comments=[];t.subtasks=t.subtasks||[];t.progress=0;t.is_carried=false;
    S.tasks.push(t);
    SB.post(t);
    return t;
  },

  update(id,changes){
    const idx=S.tasks.findIndex(t=>t.id===id);if(idx<0)return;
    const ts=new Date().toISOString();
    Object.assign(S.tasks[idx],changes,{updated_at:ts});
    const payload={...changes,updated_at:ts};
    SB.patch(id,payload).then(async r=>{
      if(!r.ok){const err=await r.text();console.error('Supabase PATCH failed:',r.status,err);}
    }).catch(e=>console.error('Supabase PATCH error:',e));
    return S.tasks[idx];
  },

  addComment(taskId,text){
    const idx=S.tasks.findIndex(t=>t.id===taskId);if(idx<0)return;
    const comments=[...(S.tasks[idx].comments||[]),{id:'c'+Date.now(),uid:S.user.id,text,at:new Date().toISOString()}];
    S.tasks[idx].comments=comments;
    SB.patch(taskId,{comments,updated_at:new Date().toISOString()});
  },

  updateSubtasks(taskId,subtasks){
    const idx=S.tasks.findIndex(t=>t.id===taskId);if(idx<0)return;
    S.tasks[idx].subtasks=subtasks;
    S.tasks[idx].updated_at=new Date().toISOString();
    SB.patch(taskId,{subtasks,updated_at:S.tasks[idx].updated_at});
  }
};

// ── HELPERS ───────────────────────────────────────────────
function uid(id){return USERS.find(u=>u.id===id);}
function devs(){return USERS.filter(u=>u.role==='developer'||u.also_dev);}
function av(u){return u?u.name.split(' ').map(n=>n[0]).join('').slice(0,2):'?';}
function fdate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function today(){return new Date().toISOString().split('T')[0];}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function slabel(s){return{todo:'To be Picked',in_progress:'WIP',review:'Review/Test',blocked:'Blocked',done:'Done',discussion:'Discussion',dependant:'Dependant',dropped:'Dropped',on_leave:'On Leave'}[s]||s;}
function parseTicket(val){
  if(!val)return{id:'',url:''};
  if(val.includes('||')){const[id,url]=val.split('||',2);return{id:id.trim(),url:url.trim()};}
  if(val.startsWith('http')){
    const m=val.match(/\/work_packages\/(\d+)/)||val.match(/\/browse\/([A-Z0-9]+-\d+)/)||val.match(/\/issues\/(\d+)/);
    return m?{id:m[1],url:val}:{id:'🔗',url:val};
  }
  return{id:val,url:''};
}
function renderTicket(val,small){
  const{id,url}=parseTicket(val);
  if(!id)return'—';
  const fs=small?'10px':'11px';
  const badge=`<span style="font-family:monospace;font-size:${fs};background:#f1f5f9;color:#1e40af;padding:2px 7px;border-radius:4px;font-weight:700;">${id}</span>`;
  if(url)return`<a href="${url}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-flex;align-items:center;gap:3px;">${badge}<span style="font-size:10px;color:#3b82f6;">↗</span></a>`;
  return badge;
}
function schip(s){return{todo:'ch-todo',in_progress:'ch-in_progress',review:'ch-review',blocked:'ch-blocked',done:'ch-done',discussion:'ch-discussion',dependant:'ch-dependant',dropped:'ch-dropped',on_leave:'ch-on_leave'}[s]||'ch-todo';}
function isBreached(t){const e=t.edd_sm||t.edd;if(!e||t.status==='done')return false;return new Date(e)<new Date(today());}
function isAging(t){if(t.status!=='in_progress')return false;return(Date.now()-new Date(t.updated_at||t.created_at))/(864e5)>=3;}
function progColor(p){return p>=80?'#22c55e':p>=40?'#3b82f6':'#f59e0b';}
function autoProg(t){if(!t.subtasks?.length)return t.progress||0;return Math.round(t.subtasks.filter(s=>s.status==='done').length/t.subtasks.length*100);}
function weekNum(d){const s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/864e5+s.getDay()+1)/7);}
function showLoading(msg){const l=document.getElementById('loading');l.style.display='flex';document.getElementById('loading-msg').textContent=msg||'Loading…';}
function hideLoading(){document.getElementById('loading').style.display='none';}
function setSyncDot(state){const d=document.getElementById('sync-dot');if(d){d.className='sync-dot'+(state==='syncing'?' syncing':'');}}

const TYPE_ICON={feature:'✨',bug:'🐛',optimisation:'⚡','ad-hoc':'🔀',chore:'🔧'};
const TYPE_COLOR={feature:'#3b82f6',bug:'#ef4444',optimisation:'#f59e0b','ad-hoc':'#8b5cf6',chore:'#64748b'};

// ── AUTH ──────────────────────────────────────────────────
async function hashPwd(pwd){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode('scrumboard-im-2026-'+pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function loginSetErr(msg){const e=document.getElementById('l-err');e.textContent=msg;e.style.display='block';}
function loginClearErr(){document.getElementById('l-err').style.display='none';}
function loginSetLoading(on){const b=document.getElementById('l-btn');if(b)b.textContent=on?'Checking…':'Sign In →';b.disabled=on;}

async function doLogin(){
  loginClearErr();
  const userId=document.getElementById('l-user').value;
  const pass=document.getElementById('l-pass').value;
  if(!userId){loginSetErr('Please select your name.');return;}
  if(!pass){loginSetErr('Please enter your password.');return;}
  loginSetLoading(true);
  const storedHash=await SB.getPwd(userId);
  if(!storedHash){
    // First time — no password set yet
    loginSetLoading(false);
    showSetPassword(userId,pass);
    return;
  }
  const inputHash=await hashPwd(pass);
  if(inputHash!==storedHash){
    loginSetLoading(false);
    loginSetErr('Incorrect password. Try again.');
    return;
  }
  loginSetLoading(false);
  const u=USERS.find(u=>u.id===userId);
  S.user=u;
  sessionStorage.setItem('scrumUserId', userId);
  sessionStorage.setItem('scrumUserId', userId);
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='flex';
  initApp();
}

    <div class="fg"><label>Confirm Password</label>

async function saveNewPassword(userId){
  const np=document.getElementById('sp-new').value;
  const cp=document.getElementById('sp-confirm').value;
  const err=document.getElementById('sp-err');
  if(np.length<6){err.textContent='Password must be at least 6 characters.';return;}
  if(np!==cp){err.textContent='Passwords do not match.';return;}
  err.textContent='Saving…';
  const hash=await hashPwd(np);
  await SB.setPwd(userId,hash);
  document.getElementById('set-pwd-overlay').remove();
  const u=USERS.find(u=>u.id===userId);
  S.user=u;
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='flex';
  initApp();
}

async function doChangePassword(userId){
  const cur=document.getElementById('cp-cur').value;
  const np=document.getElementById('cp-new').value;
  const cp=document.getElementById('cp-cfm').value;
  const err=document.getElementById('cp-err');
  if(!cur){err.textContent='Enter your current password.';return;}
  if(np.length<6){err.textContent='New password must be at least 6 characters.';return;}
  if(np!==cp){err.textContent='New passwords do not match.';return;}
  err.textContent='Verifying…';
  const storedHash=await SB.getPwd(userId);
  const curHash=await hashPwd(cur);
  if(storedHash&&curHash!==storedHash){err.textContent='Current password is incorrect.';return;}
  err.textContent='Saving…';
  const newHash=await hashPwd(np);
  await SB.setPwd(userId,newHash);
  document.getElementById('chpwd-overlay').remove();
  toast('🔐 Password updated successfully');
}

  const now=new Date();
  document.getElementById('sprint-label').textContent='Week '+weekNum(now)+' · '+now.toLocaleDateString('en-US',{month:'short',year:'numeric'});
  buildNav();
  await db.init();
  // Load today's absent devs from Supabase
  const todayStr=new Date().toISOString().slice(0,10);
  const absentIds=await SB.getAbsent(todayStr);
  S.absentDevs=new Set(absentIds);
  nav(u.role==='developer'?'my-tasks':'board');
  // Auto-refresh every 30s to sync team changes
  S.refreshTimer=setInterval(()=>db.refresh(),30000);
}

function buildNav(){
  const r=S.user.role;
  const items=[];
  if(r==='manager'||r==='scrum_master'){
    items.push({id:'board',icon:'📋',label:'Board'});
    items.push({id:'workload',icon:'👥',label:'Workload'});
  }
  if(r==='developer'){
    items.push({id:'my-tasks',icon:'✅',label:'My Tasks'});
    items.push({id:'board',icon:'📋',label:'Team Board'});
  }
  if(r==='manager'||r==='scrum_master')items.push({id:'table',icon:'📊',label:'Table View'});
  if(r==='manager'||r==='scrum_master')items.push({id:'planner',icon:'🗂️',label:'Sprint Planner'});
  items.push({id:'bugs',icon:'🐛',label:'Bug Summary'});
  items.push({id:'sprint',icon:'📊',label:'Sprint Summary'});
  document.getElementById('snav').innerHTML=items.map(it=>`
    <div class="nav-item" id="nav-${it.id}" onclick="nav('${it.id}')">
      <span class="nav-icon">${it.icon}</span>${it.label}
    </div>`).join('');
}

function nav(view){
  S.view=view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+view)?.classList.add('active');
  render();
}

function render(){
  const titles={board:'Board',workload:'Workload','my-tasks':'My Tasks',bugs:'Bug Summary',sprint:'Sprint Summary',table:'Table View',planner:'Sprint Planner'};
  document.getElementById('pg-title').textContent=titles[S.view]||'';
  document.getElementById('pg-sub').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('pg-actions').innerHTML='';
  document.getElementById('content').innerHTML='';
  if(S.view==='board')renderBoard();
  else if(S.view==='workload')renderWorkload();
  else if(S.view==='my-tasks')renderMyTasks();
  else if(S.view==='bugs')renderBugSummary();
  else if(S.view==='sprint')renderSprint();
  else if(S.view==='table')renderTable();
  else if(S.view==='planner')renderSprintPlanner();
}

      <select id="fmed" onchange="rbc()"><option value="">All Mediums</option>${MEDIUMS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
      <select id="fcb" onchange="rbc()"><option value="">All Created By</option>${USERS.filter(u=>u.role==='manager'||u.role==='scrum_master').map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select>
      <select id="fo" onchange="rbc()"><option value="">All</option><option value="overdue">⚠️ Overdue</option><option value="carried">↩ Carried Over</option><option value="review">Review/Test</option><option value="blocked">Blocked</option><option value="dependant">Dependant</option><option value="discussion">Discussion</option><option value="dropped">Dropped</option></select>
    </div>

  const _f=S.filters;
  const _s=(id,v)=>{const e=document.getElementById(id);if(e&&v)e.value=v;};
  _s('fs',_f.s);_s('fd',_f.d);_s('ft',_f.t);_s('fp',_f.p);_s('fm',_f.m);_s('fmed',_f.med);_s('fo',_f.o);_s('fcb',_f.cb);
  rbc();
}

function gf(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const f={s:g('fs').toLowerCase(),d:g('fd'),t:g('ft'),p:g('fp'),m:g('fm'),med:g('fmed'),o:g('fo'),cb:g('fcb')};
  Object.assign(S.filters,f);
  return f;
}

function filtered(){
  const f=gf();
  return db.tasks().filter(t=>{
    if(f.s&&!t.title.toLowerCase().includes(f.s))return false;
    if(f.d){if(f.d==='__unassigned__'){if(t.assignee_id)return false;}else if(t.assignee_id!==f.d)return false;}
    if(f.t&&t.type!==f.t)return false;
    if(f.p&&t.priority!==f.p)return false;
    if(f.m&&t.module!==f.m)return false;
    if(f.med&&t.medium!==f.med)return false;
    if(f.o==='overdue'&&!isBreached(t))return false;
    if(f.o==='carried'&&!t.is_carried)return false;
    if(f.o==='blocked'&&t.status!=='blocked')return false;
    if(f.o==='dependant'&&t.status!=='dependant')return false;
    if(f.o==='discussion'&&t.status!=='discussion')return false;
    if(f.o==='dropped'&&t.status!=='dropped')return false;
    if(f.cb&&t.created_by!==f.cb)return false;
    return true;
  });
}

function rbc(){
  const el=document.getElementById('brd');if(!el)return;
  const tasks=filtered();
  const stats=['todo','in_progress','review','discussion','dependant','blocked','dropped','done'];
  const labels={todo:'To be Picked',in_progress:'WIP',review:'Review/Test',blocked:'Blocked',done:'Done',discussion:'Discussion',dependant:'Dependant',dropped:'Dropped'};
  el.innerHTML='<div class="board">'+stats.map(s=>{
    const ts=tasks.filter(t=>t.status===s);
    return`<div class="board-col" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropOnCol(event,'${s}')">
      <div class="board-col-hdr">
        <span class="bcol-title" style="color:${s==='blocked'||s==='dropped'?'var(--blocked)':s==='done'?'var(--done)':s==='in_progress'?'var(--inprog)':s==='discussion'?'#0f766e':s==='dependant'?'#7c3aed':s==='todo'?'#92400e':'var(--text2)'}">${labels[s]}</span>
        <span class="bcol-count">${ts.length}</span>
      </div>
      ${ts.map(t=>tcardHTML(t)).join('')}
      ${ts.length===0?`<div style="padding:16px 8px;text-align:center;font-size:11px;color:var(--text2)">No tasks</div>`:''}
    </div>`;
  }).join('')+'</div>';
}

let _dragId=null;let _spDragId=null;
function dragStart(e,id){_dragId=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dropOnCol(e,status){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_dragId)return;
  db.update(_dragId,{status});
  _dragId=null;
  render();
  toast('Status updated to '+slabel(status));
}
function tcardHTML(t){
  const a=uid(t.assignee_id);
  const edd=t.edd_sm||t.edd;
  const br=isBreached(t),ag=isAging(t);
  const p=autoProg(t);
  const ticon=TYPE_ICON[t.type]||'📌';
  const tcolor=TYPE_COLOR[t.type]||'#64748b';
  return`<div class="tcard ${typeClass(t.type)} ${br?'breached':''} ${ag&&!br?'aging':''}" draggable="true" ondragstart="dragStart(event,'${t.id}')" ondragend="this.classList.remove('dragging')" onclick="openDrawer('${t.id}')">
    <div class="tc-top">
      <div class="tc-title"><span title="${t.type}">${ticon}</span> ${t.title}</div>
      <button class="info-btn" onclick="event.stopPropagation();openDrawer('${t.id}')" title="Details">ⓘ</button>
    </div>
    ${t.module||t.medium?`<div class="tc-module">${t.module?`📦 <b>${t.module}</b>`:''}${t.module&&t.medium?' · ':''}${t.medium?`🖥 <b>${t.medium}</b>`:''}</div>`:''}
    <div class="tc-chips">
      <span class="chip ${schip(t.status)}">${slabel(t.status)}</span>
      <span class="chip ch-${t.priority}">${t.priority||'—'}</span>
      <span class="chip" style="background:${tcolor}18;color:${tcolor}">${ticon} ${t.type}</span>
      ${t.is_carried?'<span class="chip ch-carried">↩</span>':''}
    </div>
    <div class="tc-footer">
      <div style="display:flex;align-items:center;">
        ${a?`<div class="tc-av" style="background:${a.color}">${av(a)}</div><span class="tc-name">${a.name.split(' ')[0]}</span>`:'<span class="tc-name" style="color:var(--text2)">Unassigned</span>'}
      </div>
      <span class="tc-edd ${br?'red':''}">${edd?(br?'⚠️ ':'')+fdate(edd):'—'}</span>
    </div>
    ${p>0||t.subtasks?.length?`<div class="tc-prog"><div class="pbar"><div class="pfill" style="width:${p}%;background:${progColor(p)}"></div></div><div class="ptext">${p}%${t.subtasks?.length?' · '+t.subtasks.filter(s=>s.status==='done').length+'/'+t.subtasks.length+' subtasks':''}</div></div>`:''}
    ${ag&&t.status!=='done'?`<div class="aging-flag">⚠️ Stalled ${Math.floor((Date.now()-new Date(t.updated_at||t.created_at))/864e5)}d</div>`:''}
  </div>`;
}

function renderTable(){
  const r=S.user.role;
  const act=document.getElementById('pg-actions');

  if(r==='manager'||r==='scrum_master')act.innerHTML+=`<button class="btn btn-primary btn-sm" onclick="showTaskModal()">+ New Task</button>`;
  const tasks=db.tasks();
  const c=document.getElementById('content');
  // Sort state
  if(!S.tblSort)S.tblSort={col:'created_at',dir:-1};
  // Filter bar (reuse board filters)
  c.innerHTML=`
    <div class="filter-bar" style="margin-bottom:14px;">
      <input type="text" id="tfs" placeholder="🔍 Search…" oninput="renderTable()" style="width:160px;">
      <select id="tfd" onchange="renderTable()"><option value="">All Developers</option><option value="__unassigned__">Unassigned</option>${devs().map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select>
      <select id="tft" onchange="renderTable()"><option value="">All Types</option><option value="feature">✨ Feature</option><option value="bug">🐛 Bug</option><option value="optimisation">⚡ Optimisation</option><option value="ad-hoc">🔀 Ad-hoc</option><option value="chore">🔧 Chore</option></select>
      <select id="tfs2" onchange="renderTable()"><option value="">All Statuses</option><option value="todo">To be Picked</option><option value="in_progress">WIP</option><option value="review">Review/Test</option><option value="discussion">Discussion</option><option value="dependant">Dependant</option><option value="blocked">Blocked</option><option value="dropped">Dropped</option><option value="done">Done</option></select>
      <select id="tfm" onchange="renderTable()"><option value="">All Modules</option>${MODULES.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
    </div>
    <div id="tbl-wrap" style="overflow-x:auto;border-radius:10px;border:1.5px solid var(--border);"></div>`;

  // Restore saved table filters
  const tf=S.tblFilters||{};
  const _s=(id,v)=>{const e=document.getElementById(id);if(e&&v)e.value=v;};
  _s('tfs',tf.s);_s('tfd',tf.d);_s('tft',tf.t);_s('tfs2',tf.st);_s('tfm',tf.m);

  // Read filters & save
  const gv=id=>{const e=document.getElementById(id);return e?e.value:'';};
  S.tblFilters={s:gv('tfs'),d:gv('tfd'),t:gv('tft'),st:gv('tfs2'),m:gv('tfm')};
  const tf2=S.tblFilters;

  let rows=tasks.filter(t=>{
    if(tf2.s&&!t.title.toLowerCase().includes(tf2.s.toLowerCase()))return false;
    if(tf2.d){if(tf2.d==='__unassigned__'){if(t.assignee_id)return false;}else if(t.assignee_id!==tf2.d)return false;}
    if(tf2.t&&t.type!==tf2.t)return false;
    if(tf2.st&&t.status!==tf2.st)return false;
    if(tf2.m&&t.module!==tf2.m)return false;
    return true;
  });

  // Sort
  const sc=S.tblSort.col,sd=S.tblSort.dir;
  rows.sort((a,b)=>{
    let av=a[sc]||'',bv=b[sc]||'';
    if(sc==='created_at'||sc==='edd'){av=av?new Date(av).getTime():0;bv=bv?new Date(bv).getTime():0;}
    return av<bv?-1*sd:av>bv?1*sd:0;
  });

  const sortIcon=col=>S.tblSort.col===col?(S.tblSort.dir===1?'▲':'▼'):'⇅';
  const thStyle='padding:10px 12px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1.5px solid var(--border);background:#f8fafc;';
  const tdStyle='padding:10px 12px;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;';

  function sortBy(col){S.tblSort=S.tblSort.col===col?{col,dir:-S.tblSort.dir}:{col,dir:1};renderTable();}

  const assigneeName=id=>{const u=uid(id);return u?u.name.split(' ')[0]:'—';};

  const statusDropdown=(t)=>`<select onchange="db.update('${t.id}',{status:this.value});renderTable()" style="border:1.5px solid var(--border);border-radius:20px;padding:3px 8px;font-size:11px;font-weight:700;outline:none;cursor:pointer;background:transparent;appearance:none;-webkit-appearance:none;color:inherit;" class="${schip(t.status)}">

    <option value="in_progress" ${t.status==='in_progress'?'selected':''}>🔵 WIP</option>
    <option value="review" ${t.status==='review'?'selected':''}>🧪 Review/Test</option>
    <option value="discussion" ${t.status==='discussion'?'selected':''}>💬 Discussion</option>
    <option value="dependant" ${t.status==='dependant'?'selected':''}>🔗 Dependant</option>
    <option value="blocked" ${t.status==='blocked'?'selected':''}>🚫 Blocked</option>
    <option value="dropped" ${t.status==='dropped'?'selected':''}>🗑 Dropped</option>
    <option value="done" ${t.status==='done'?'selected':''}>✅ Done</option>
  </select>`;

  document.getElementById('tbl-wrap').innerHTML=`
  <table style="width:100%;border-collapse:collapse;background:#fff;">
    <thead>
      <tr>
        <th style="${thStyle}" onclick="sortBy('created_at')">Date ${sortIcon('created_at')}</th>
        <th style="${thStyle}" onclick="sortBy('module')">Module ${sortIcon('module')}</th>
        <th style="${thStyle}" onclick="sortBy('title')">Item ${sortIcon('title')}</th>
        <th style="${thStyle}" onclick="sortBy('assignee_id')">Assignee ${sortIcon('assignee_id')}</th>
        <th style="${thStyle}">Status</th>
        <th style="${thStyle}" onclick="sortBy('edd')">EDD ${sortIcon('edd')}</th>
        <th style="${thStyle}" onclick="sortBy('priority')">Priority ${sortIcon('priority')}</th>
        <th style="${thStyle}" onclick="sortBy('ticket_id')">Ticket ID ${sortIcon('ticket_id')}</th>
        <th style="${thStyle}">Remark</th>
      </tr>
    </thead>
    <tbody>
      ${rows.length===0?`<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text2);">No tasks found</td></tr>`
        :rows.map(t=>{
          const edd=t.edd_sm||t.edd;
          const br=isBreached(t);
          const a=uid(t.assignee_id);
          const dateStr=t.created_at?new Date(t.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';
          return`<tr onclick="openDrawer('${t.id}')" style="cursor:pointer;transition:background .12s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
            <td style="${tdStyle}white-space:nowrap;color:var(--text2);font-size:11px;">${dateStr}</td>
            <td style="${tdStyle}">${t.module?`<span style="font-size:11px;font-weight:700;background:#f1f5f9;color:#475569;padding:2px 7px;border-radius:10px;">${t.module}</span>`:'—'}</td>
            <td style="${tdStyle}max-width:260px;">
              <div style="font-weight:600;line-height:1.4;">${TYPE_ICON[t.type]||'📌'} ${t.title}</div>
              ${t.blocker_reason?`<div style="font-size:10px;color:var(--blocked);margin-top:2px;">🚫 ${t.blocker_reason}</div>`:''}
            </td>

            <td style="${tdStyle}"><span class="chip ch-${t.priority}">${t.priority||'—'}</span></td>

}


function saveBugCount(devId,field,value){
  const cur=S.bugCounts[devId]||{dev_id:devId,total:0,resolved:0,closed:0,notes:'',yesterday_remaining:null};
  // Auto-snapshot yesterday_remaining once per day on first update
  const lastDate=(cur.updated_at||'').slice(0,10);
  const todayDate=new Date().toISOString().slice(0,10);
  if(lastDate&&lastDate!==todayDate&&cur.yesterday_remaining==null){
    cur.yesterday_remaining=Math.max(0,(cur.total||0)-(cur.resolved||0));
  }
  cur[field]=field==='notes'?value:Math.max(0,parseInt(value)||0);
  cur.dev_id=devId;
  cur.updated_at=new Date().toISOString();
  S.bugCounts[devId]=cur;
  // Update remaining display live
  const rem=Math.max(0,cur.total-cur.resolved);
  const el=document.getElementById('rem-'+devId);
  if(el){el.textContent=rem;el.style.color=rem>0?'#ef4444':'#22c55e';}
  SB.upsertBugCount(cur).catch(()=>toast('⚠️ Save failed — check Supabase'));
  toast('🐛 Saved');
}

function spSaveAssign(taskId){
  const devId=document.getElementById('sp-assign-dev').value;
  const t=db.tasks().find(x=>x.id===taskId);
  const updates={assignee_id:devId||null};
  // Auto-advance from HOD Approved to Assigned when dev is set
  if(devId&&t&&t.sprint_status==='sp_hod_approved') updates.sprint_status='sp_assigned';
  db.update(taskId,updates);
  closeModal();
  renderSprintPlanner();
  toast(devId?'✅ Developer assigned & moved to Assigned':'✅ Assignee cleared');
}
function spSendSummary(){
  const tasks=db.tasks().filter(t=>MGR_IDS.includes(t.created_by));
  const hodMention=`<users/${HOD_GCHAT_ID}>`;
  let parts=[];

  // ── HOD Approval Pending section ──
  const pendingTasks=tasks.filter(t=>(t.sprint_status||'sp_created')==='sp_created');
  if(pendingTasks.length){
    const ticketLines=pendingTasks.map(t=>{
      const tk=parseTicket(t.ticket_id);
      return tk.url?`• <${tk.url}|${tk.id||t.title}>`:` • ${t.title}`;
    }).join('\n');
    parts.push(`${hodMention} HOD approval pending for below tickets :\n${ticketLines}`);
  }

  // ── HOD Approved / To be Assigned section ──
  const hodApproved=tasks.filter(t=>t.sprint_status==='sp_hod_approved');
  if(hodApproved.length){
    const lines=hodApproved.map(t=>{
      const tk=parseTicket(t.ticket_id);
      const ref=tk.url?`<${tk.url}|${tk.id||t.title}>`:t.title;
      return `• ${ref}`;
    }).join('\n');
    parts.push(`*To be Assigned* (${hodApproved.length})\n${lines}`);
  }

  // ── Assigned section ──
  const assigned=tasks.filter(t=>t.sprint_status==='sp_assigned');
  if(assigned.length){
    const lines=assigned.map(t=>{
      const tk=parseTicket(t.ticket_id);
      const ref=tk.url?`<${tk.url}|${tk.id||t.title}>`:t.title;
      const a=uid(t.assignee_id);
      return `• ${ref}${a?' → 👤 '+a.name.split(' ')[0]:''}`;
    }).join('\n');
    parts.push(`*Assigned* (${assigned.length})\n${lines}`);
  }

  if(!parts.length){toast('No tickets to send');return;}
  const text=parts.join('\n\n');
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})})
    .then(r=>r.ok?toast('✅ Summary sent to Google Chat'):toast('❌ Webhook failed'))
    .catch(()=>toast('❌ Network error'));
}


function renderSprint(){
  const tasks=db.tasks();

  let gBugTotal=0,gBugResolved=0,gBugRemaining=0;
  devs().forEach(dev=>{
    const bc=S.bugCounts[dev.id]||{total:0,resolved:0};

            <div style="font-size:11px;color:var(--text2);margin-top:2px;">${dt.length} tasks · ${dc.length} done · ${dBlocked.length} blocked</div>
          </div>
          <span style="background:${avail.bg};color:${avail.color};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;">${avail.label}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
          <!-- Task progress -->
          <div style="background:#f8fafc;border-radius:8px;padding:12px;">
            <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:8px;">Task Progress</div>
            <div style="font-size:20px;font-weight:800;color:${pcolor};margin-bottom:6px;">${pct}%</div>
            <div class="pbar"><div class="pfill" style="width:${pct}%;background:${pcolor}"></div></div>
            <div style="font-size:10px;color:var(--text2);margin-top:4px;">${dc.length}/${dt.length} completed</div>
          </div>
          <!-- Bug tracker (from bug_counts table) -->
          <div style="background:#fff5f5;border-radius:8px;padding:12px;border:1px solid #fecaca;">
            <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#ef4444;margin-bottom:8px;">🐛 Bug Tracker</div>
            <div style="display:flex;gap:8px;margin-bottom:6px;">
              <div style="flex:1;text-align:center;">
                <div style="font-size:16px;font-weight:800;color:#3b82f6;">${bc.total}</div>

              </div>
            </div>

            <div style="font-size:10px;color:var(--text2);margin-top:4px;">${bc.closed||0} closed by tester</div>
          </div>
          <!-- Dashboard bug tasks -->
          <div style="background:#fafcff;border-radius:8px;padding:12px;border:1px solid #dbeafe;">
            <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#3b82f6;margin-bottom:8px;">📋 Task Bugs</div>

            <div style="display:flex;gap:8px;margin-bottom:6px;">

                <div style="font-size:16px;font-weight:800;color:#f59e0b;">${dbBugsOpen.length}</div>

function parseRelTickets(val){
  if(!val)return[];
  try{return JSON.parse(val);}catch(e){return[];}
}
const REL_LABELS={blocks:'🔴 Blocks',blocked_by:'🔴 Blocked by',relates:'🔗 Relates to',duplicate:'📋 Duplicate of',parent:'⬆ Parent of',child:'⬇ Child of'};
function addRelTicket(taskId){
  const relType=document.getElementById('dw-rel-type').value;
  const relId=(document.getElementById('dw-rel-id').value||'').trim();
  const relUrl=(document.getElementById('dw-rel-url').value||'').trim();
  if(!relId&&!relUrl){toast('Enter a ticket ID or URL');return;}
  const t=db.tasks().find(x=>x.id===taskId);if(!t)return;
  const existing=parseRelTickets(t.related_tickets);
  // auto-extract ID from URL if ID empty
  let finalId=relId;
  if(!finalId&&relUrl){const m=relUrl.match(/\/work_packages\/(\d+)/)||relUrl.match(/\/browse\/([A-Z0-9]+-\d+)/)||relUrl.match(/\/issues\/(\d+)/);if(m)finalId=m[1];}
  existing.push({rel:relType,id:finalId||'🔗',url:relUrl});
  db.update(taskId,{related_tickets:JSON.stringify(existing)});
  setTimeout(()=>openDrawer(taskId),300);
  toast('✅ Relation added');
}
function removeRelTicket(taskId,idx){
  const t=db.tasks().find(x=>x.id===taskId);if(!t)return;
  const arr=parseRelTickets(t.related_tickets);
  arr.splice(idx,1);
  db.update(taskId,{related_tickets:arr.length?JSON.stringify(arr):null});
  setTimeout(()=>openDrawer(taskId),300);
}
function deleteTask(id){
  if(!confirm('Delete this task? This cannot be undone.'))return;
  S.tasks=S.tasks.filter(t=>t.id!==id);
  fetch(SB.url+'/rest/v1/tasks?id=eq.'+id,{method:'DELETE',headers:SB.hdrs});
  closeDrawer();toast('🗑 Task deleted');render();
}

  pop.innerHTML=`

      <button onclick="smrySelAll('${group}')" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:11px;font-weight:700;padding:4px;cursor:pointer;">Select All</button>
      <button onclick="smryClearAll('${group}')" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:11px;font-weight:700;padding:4px;cursor:pointer;">Clear</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${opts.map(o=>`<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);cursor:pointer;user-select:none;"><input type="checkbox" ${selected.has(o.val)?'checked':''} onchange="toggleSmryFilterVal('${group}','${o.val}')" style="cursor:pointer;">${o.label}</label>`).join('')}
    </div>`;
  pop.style.display='block';
}
function toggleSmryFilterVal(group,val){
  if(_SF[group].has(val))_SF[group].delete(val);else _SF[group].add(val);
  renderSummaryTable();
}
function closeSmryFilter(){const pop=document.getElementById('smry-filter-popover');if(pop)pop.style.display='none';}
function smrySelAll(group){
  _SF[group]=new Set(_SFOpts[group]().map(o=>o.val));
  Array.from(document.getElementById('smry-filter-popover').querySelectorAll('input[type="checkbox"]')).forEach(cb=>cb.checked=true);
  renderSummaryTable();
}
function smryClearAll(group){
  _SF[group]=new Set();
  Array.from(document.getElementById('smry-filter-popover').querySelectorAll('input[type="checkbox"]')).forEach(cb=>cb.checked=false);
  renderSummaryTable();
}
document.addEventListener('click',e=>{
  const pop=document.getElementById('smry-filter-popover');
  if(pop&&pop.style.display==='block'&&!pop.contains(e.target)&&!e.target.closest('[onclick^="openSmryFilter"]'))closeSmryFilter();
});

function renderSummaryTable(){
  const allTasks=db.tasks();
  const filterIcon=(group)=>`<span style="cursor:pointer;margin-left:5px;opacity:0.7;font-size:10px;padding:2px 4px;background:rgba(255,255,255,0.1);border-radius:4px;display:inline-flex;align-items:center;" onclick="openSmryFilter(event,'${group}')" title="Filter">▼</span>`;
  const thS='padding:9px 12px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#fff;white-space:nowrap;border-bottom:2px solid rgba(255,255,255,.15);background:#1e3a5f;';
  const tdS='padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;';
  let rows='';let leaveRows='';let rowCount=0;
  devs().forEach(dev=>{
    if(!_SF.devs.has(dev.id))return;
    let dt=allTasks.filter(t=>t.assignee_id===dev.id&&_SF.statuses.has(t.status)&&_SF.priorities.has(t.priority)&&_SF.modules.has(t.module||''));
    // Absent devs: collect separately to show at end
    if(S.absentDevs.has(dev.id)){
      if(_SF.statuses.has('on_leave')){
        leaveRows+=`<tr><td colspan="9" style="padding:8px 12px;background:#fff8f8;font-size:12px;font-weight:800;color:var(--text);border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:22px;height:22px;border-radius:50%;background:${dev.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;opacity:.5;">${av(dev)}</div>
            <span style="opacity:.6">${dev.name}</span>
            <span class="chip ch-on_leave" style="font-size:10px;">🏖 On Leave Today</span>
          </div></td></tr>`;
      }
      return;
    }
    if(!dt.length)return;
    rowCount+=dt.length;
    rows+=`<tr><td colspan="9" style="padding:8px 12px;background:#f8fafc;font-size:12px;font-weight:800;color:var(--text);border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:22px;height:22px;border-radius:50%;background:${dev.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;">${av(dev)}</div>
        ${dev.name}
      </div></td></tr>`;
    dt.forEach(t=>{
      const edd=t.edd_sm||t.edd;const br=isBreached(t);
      const d2=t.created_at?new Date(t.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'—';
      rows+=`<tr>
        <td style="${tdS}white-space:nowrap;color:var(--text2);font-size:11px;">${d2}</td>
        <td style="${tdS}">${t.module?`<span style="font-size:11px;font-weight:700;background:#f1f5f9;color:#475569;padding:2px 7px;border-radius:10px;">${t.module}</span>`:'—'}</td>
        <td style="${tdS}max-width:300px;"><div style="font-weight:600;line-height:1.4;">${TYPE_ICON[t.type]||'📌'} ${t.title}</div>${t.blocker_reason?`<div style="font-size:10px;color:var(--blocked);margin-top:1px;">🚫 ${t.blocker_reason}</div>`:''}</td>
        <td style="${tdS}white-space:nowrap;font-size:11px;">${dev.name.split(' ')[0]}</td>
        <td style="${tdS}"><span class="chip ${schip(t.status)}" style="font-size:10px;">${slabel(t.status)}</span></td>
        <td style="${tdS}white-space:nowrap;${br?'color:var(--blocked);font-weight:700;':''}">${edd?fdate(edd)+(br?' ⚠️':''):'—'}</td>
        <td style="${tdS}"><span class="chip ch-${t.priority}" style="font-size:10px;">${t.priority||'—'}</span></td>
        <td style="${tdS}">${renderTicket(t.ticket_id,true)}</td>
        <td style="${tdS}color:var(--text2);font-size:11px;max-width:160px;">${t.remark||''}</td>
      </tr>`;
    });
  });
  rows+=leaveRows;
  const tbl=`<table style="width:100%;border-collapse:collapse;background:#fff;">
    <thead style="position:sticky;top:0;z-index:2;box-shadow:0 2px 4px rgba(0,0,0,.1);"><tr><th style="${thS}">Date</th><th style="${thS}">Module${filterIcon('modules')}</th><th style="${thS}">Item</th><th style="${thS}">Assignee${filterIcon('devs')}</th><th style="${thS}">Status${filterIcon('statuses')}</th><th style="${thS}">EDD</th><th style="${thS}">Priority${filterIcon('priorities')}</th><th style="${thS}">Ticket ID</th><th style="${thS}">Remark</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="9" style="padding:20px;text-align:center;color:#94a3b8;">No tasks match filters</td></tr>'}</tbody>
  </table>`;
  // Unassigned tasks section
  const unassignedTasks=allTasks.filter(t=>!t.assignee_id&&_SF.statuses.has(t.status)&&_SF.priorities.has(t.priority)&&_SF.modules.has(t.module||''));
  if(_SF.devs.has('__unassigned__')&&unassignedTasks.length){
    rowCount+=unassignedTasks.length;
    rows+=`<tr><td colspan="9" style="padding:8px 12px;background:#f8fafc;font-size:12px;font-weight:800;color:var(--text);border-bottom:1px solid var(--border);"><div style="display:flex;align-items:center;gap:8px;"><div style="width:22px;height:22px;border-radius:50%;background:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;">?</div>Unassigned</div></td></tr>`;
    unassignedTasks.forEach(t=>{
      const edd=t.edd_sm||t.edd;const br=isBreached(t);
      const d2=t.created_at?new Date(t.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'—';
      rows+=`<tr>
        <td style="${tdS}white-space:nowrap;color:var(--text2);font-size:11px;">${d2}</td>
        <td style="${tdS}">${t.module?`<span style="font-size:11px;font-weight:700;background:#f1f5f9;color:#475569;padding:2px 7px;border-radius:10px;">${t.module}</span>`:'—'}</td>
        <td style="${tdS}max-width:300px;"><div style="font-weight:600;line-height:1.4;">${TYPE_ICON[t.type]||'📌'} ${t.title}</div>${t.blocker_reason?`<div style="font-size:10px;color:var(--blocked);margin-top:1px;">🚫 ${t.blocker_reason}</div>`:''}</td>
        <td style="${tdS}white-space:nowrap;font-size:11px;color:var(--text2);">—</td>
        <td style="${tdS}"><span class="chip ${schip(t.status)}" style="font-size:10px;">${slabel(t.status)}</span></td>
        <td style="${tdS}white-space:nowrap;${br?'color:var(--blocked);font-weight:700;':''}">${edd?fdate(edd)+(br?' ⚠️':''):'—'}</td>
        <td style="${tdS}"><span class="chip ch-${t.priority}" style="font-size:10px;">${t.priority||'—'}</span></td>
        <td style="${tdS}">${renderTicket(t.ticket_id,true)}</td>
        <td style="${tdS}color:var(--text2);font-size:11px;max-width:160px;">${t.remark||''}</td>
      </tr>`;
    });
  }
  const wrap=document.getElementById('smry-tbl-wrap');if(wrap)wrap.innerHTML=tbl;
  const cnt=document.getElementById('smry-count');if(cnt)cnt.textContent=`${rowCount} tasks shown`;
}
function copyToSheet(){
  const url=localStorage.getItem('sheet_script_url');
  if(!url){
    const inp=prompt('Paste your Google Apps Script Web App URL:');
    if(!inp)return;
    localStorage.setItem('sheet_script_url',inp.trim());
    doSheetExport(inp.trim());
  } else {
    doSheetExport(url);
  }
}
async function doSheetExport(url){
  const btn=document.querySelector('[onclick="copyToSheet()"]');
  if(btn){btn.textContent='Sending…';btn.disabled=true;}
  const tasks=db.tasks();
  const rows=[];
  USERS.forEach(dev=>{
    if(S.absentDevs.has(dev.id)){
      lines.push('🏖 '+dev.name.split(' ')[0]+' — On Leave Today');
      lines.push('');
      return;
    }
    const dt=tasks.filter(t=>t.assignee_id===dev.id&&t.status!=='done');
    dt.forEach(t=>{
      const createdDate=t.created_at?new Date(t.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'';
      const eddDate=t.edd_sm||t.edd;
      let remark=t.remark||'';
      if(t.blocker_reason)remark=(remark?remark+' | ':'')+t.blocker_reason;
      rows.push({
        date:createdDate,
        module:t.module||'',
        item:t.title,
        assignee:dev.name.split(' ')[0],
        status:{todo:'To be Picked',in_progress:'WIP',review:'Review/Test',blocked:'Blocked',done:'Done',discussion:'Discussion',dependant:'Dependant',dropped:'Dropped'}[t.status]||t.status,
        edd:t.edd?fdate(t.edd):'',
        edd_sm:t.edd_sm?fdate(t.edd_sm):'',
        priority:t.priority||'',
        ticket_id:parseTicket(t.ticket_id).id,
        remark
      });
    });
  });
  try{
    const r=await fetch('/api/sheet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tasks:rows})});
    const d=await r.json();
    if(d.success){toast(`✅ ${d.rows} rows written to sheet!`);}
    else{toast('❌ Sheet error: '+(d.error||'unknown'));}
  }catch(e){toast('❌ Failed: '+e.message);}
  finally{if(btn){btn.textContent='📊 Copy to Sheet';btn.disabled=false;}}
}
async function postToGChat(){
  const btn=document.getElementById('gchat-btn');
  if(btn){btn.textContent='Sending…';btn.disabled=true;}
  const tasks=db.tasks();
  const d=new Date();
  const dateStr=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  const stag=s=>({todo:'PICK',in_progress:'WIP ',review:'REVW',blocked:'BLKD',discussion:'DISC',dependant:'DEPN',dropped:'DROP'}[s]||'    ');
  const sections=[];
  devs().forEach(dev=>{
    if(S.absentDevs.has(dev.id))return;
    const dt=tasks.filter(t=>t.assignee_id===dev.id&&t.status!=='done');
    if(!dt.length)return;
    const rows=dt.map(t=>{
      const edd=t.edd_sm||t.edd;
      const tag=stag(t.status);
      const eddStr=edd?fdate(edd):'——    ';
      const pri=t.priority||'—— ';
      const title=t.status==='in_progress'?`*${t.title}*`:t.title;
      const mod=t.module?` (${t.module})`:'';
      let line=`  ${tag} · ${pri} · ${eddStr} · ${title}${mod}`;
      if(t.blocker_reason)line+=`\n              ⚠️ ${t.blocker_reason}`;
      return line;
    }).join('\n');
    sections.push(`*${dev.name}*\n${rows}`);
  });
  const total=tasks.filter(t=>t.status!=='done').length;
  const devCount=devs().filter(d=>tasks.some(t=>t.assignee_id===d.id&&t.status!=='done')).length;
  const text=`📋 *Daily Scrum Summary — ${dateStr}*\n_${total} open tasks · ${devCount} developers_\n\n${sections.join('\n\n')}`;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(r.ok){toast('✅ Posted to Google Chat!');if(btn){btn.textContent='✅ Sent!';}}
    else{const e=await r.json();toast('❌ Failed: '+(e.error||r.status));if(btn){btn.textContent='📨 Post to Google Chat';btn.disabled=false;}}
  }catch(e){
    toast('❌ Error: '+e.message);
    if(btn){btn.textContent='📨 Post to Google Chat';btn.disabled=false;}
  }
}
